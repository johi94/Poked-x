<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedéx</title>
    <link rel="shortcut icon" href="./assets/img/pokeball.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Monda:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/dialog.css">
    <script src="./script.js" defer></script>
    <script src="./scripts/template.js"></script>
  </head>
  <body onload="fetchDataJsonPokemonDetails()">
    <header>
      <div class="content-width">
        <div class="logo_title_container">
         <img src="./assets/img/pokeball.png" alt="Pokeball" class="pokeball_img" />
         <h1>Pokedéx</h1>
        </div>
        <div class="search_btn_input">
         <button class="search_btn">search</button>
         <input class="search_input" type="search" placeholder="search Pokémon" title="search">
        </div>
      </div>
    </header>
    <main>
     <section class="content_section">
      <div id="content"></div>
     </section>
     </main>
    <footer>
     <p class="copyright_footer">&#169 2026 Pokedéx designed by Jonas Hildebrand</p>
    </footer>
     <dialog id="open_pokemon_card">
      <button class="close_pokemon_card_btn" onclick="closePokemonCardDialog()">X</button>
       <div id="pokemon_card_content"></div>
     </dialog>
  </body>
</html>
